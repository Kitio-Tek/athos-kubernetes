name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.24.13"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    # Advisory: govulncheck reports stdlib advisories that often track the
    # runner's Go toolchain rather than this project's source. Surface the
    # findings without failing the run so a fresh stdlib advisory cannot
    # block unrelated changes from merging.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude-dir=test -exclude-dir=tests -exclude-dir=hack -exclude-generated -fmt=sarif -out=gosec.sarif ./...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
