run:
  timeout: 5m
  allow-parallel-runners: true

issues:
  # don't skip warning about doc comments
  # don't exclude the default set of lint
  exclude-use-default: false
  max-same-issues: 0
  exclude-rules:
    - path: "api/*"
      linters:
        - lll
    - path: "internal/*"
      linters:
        - dupl
        - lll
    # kubebuilder marker comments use //+ without a trailing space; that is
    # intentional and must not be flagged by comment-spacings.
    - source: "^//\\+"
      linters:
        - revive
    # Test files allow duplicate code and long lines.
    - path: "_test\\.go"
      linters:
        - dupl
        - goconst
linters:
  disable-all: true
  enable:
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - godot
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

linters-settings:
  revive:
    rules:
      - name: comment-spacings
  godot:
    scope: declarations
    period: true
