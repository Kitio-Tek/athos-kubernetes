# permissions for end users to edit postgresclusters.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: athos
    app.kubernetes.io/managed-by: kustomize
  name: postgrescluster-editor-role
rules:
- apiGroups:
  - pg.athos.io
  resources:
  - postgresclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pg.athos.io
  resources:
  - postgresclusters/status
  verbs:
  - get
